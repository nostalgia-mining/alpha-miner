#!/usr/bin/env bash
####################################################################################
###
### AlphaMiner PEARL - HiveOS Wrapper
### Inspired by NOCKminer wrapper by nostalgia
### Uses alpha-miner binary by AlphaMine-Tech
###
####################################################################################

# The name of the miner — MUST match the directory name (= tarball top-level folder)
CUSTOM_NAME=alpha-wrapper

# Version: <alpha-miner version>.<wrapper revision>
CUSTOM_VERSION=1.8.3.01

# Full path to miner config file
CUSTOM_CONFIG_FILENAME=/hive/miners/custom/${CUSTOM_NAME}/miner.conf

# Full path to log file basename (WITHOUT .log extension)
CUSTOM_LOG_BASENAME=/var/log/miner/custom/$CUSTOM_NAME

CUSTOM_API_PORT=63003

# Compatibility aliases used by some HiveOS framework internals
MINER_NAME=$CUSTOM_NAME
MINER_VER=$CUSTOM_VERSION
MINER_CONFIG_FILENAME=$CUSTOM_CONFIG_FILENAME
