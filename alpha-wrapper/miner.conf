# Default miner.conf — overwritten by h-config.sh on every HiveOS start.
# Edit this file only when running outside HiveOS.
#
# Pool URL:   set via HiveOS Flight Sheet "Pool URL" field
# Password:   set via HiveOS Flight Sheet "Password" field (e.g. x;d=524288)
# Wallet:     set via HiveOS Flight Sheet "Wallet" field
#
# GPU selection: add --devices 0,1 or --gpu 0,1 in "Extra config" field.
# If omitted, all GPUs are used.

POOLS=( stratum+tcp://us1.alphapool.tech:5566 )
ALPHA_BASE_ARGS=( --address prl1YOUR_ADDRESS_HERE --worker rig01 --status-interval 30 )
WRAPPER_GPU_LIST=all
WRAPPER_NOSTATS=0
POOL_URL=stratum+tcp://us1.alphapool.tech:5566
WALLET=prl1YOUR_ADDRESS_HERE
WORKER=rig01
