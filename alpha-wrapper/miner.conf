# Default miner.conf — overwritten by h-config.sh on every HiveOS start.
# If you see this content in the supervisor output, h-config.sh did not run
# or wrote to the wrong path. Check that CUSTOM_NAME in h-manifest.conf
# matches the installed directory name (/hive/miners/custom/alpha-wrapper/).
#
# This file is intentionally left with no valid address so the miner exits
# immediately rather than mining to a placeholder wallet.
POOLS=()
ALPHA_BASE_ARGS=()
WRAPPER_GPU_LIST=all
WRAPPER_NOSTATS=0
WRAPPER_PASSWORD=
POOL_URL=
WALLET=
